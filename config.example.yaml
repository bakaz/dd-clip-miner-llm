# dd-clip-miner-llm 配置文件
# 用法: python -m dd_clip_miner_llm run 视频.mp4 --config config.yaml

# ─── 音频预处理 ───────────────────────────────
audio:
  sample_rate: 16000
  channels: 1

# ─── ASR 配置 ─────────────────────────────────
asr:
  # 模式选择: local（本地模型）或 remote（远程 API）
  mode: local

  # ========== 本地模式 ==========
  local:
    backend: faster_whisper   # faster_whisper | funasr

    # faster_whisper 配置
    # 支持 gpu/cpu 自动分流：设置 device: auto（或省略），并提供 gpu: / cpu: 节。
    # 代码会根据 CTranslate2 可用设备自动选择并合并对应节的内容。
    faster_whisper:
      model: small               # tiny | base | small | medium | large-v3
      device: auto               # auto | cpu | cuda  -- "auto" + gpu/cpu 节触发自动分流
      compute_type: default
      cpu_threads: 8
      num_workers: 1
      batch_size: 8
      inference_mode: batched   # batched | standard （显式声明，优先于 batch_size 推导）
      language: null
      beam_size: 5
      vad_filter: true
      initial_prompt: null
      word_timestamps: true
      split_on_word_gaps: true
      word_gap_seconds: 2.0
      max_segment_seconds: 15.0

    # device: auto 时按 CTranslate2 可用设备自动选择。
    # gpu/cpu 也可放进 faster_whisper 内，以下顶层结构更清晰。
    # gpu:
    #   faster_whisper:
    #     device: cuda
    #     compute_type: float16
    #     batch_size: 8
    # cpu:
    #   faster_whisper:
    #     device: cpu
    #     compute_type: int8
    #     cpu_threads: 8
    #     batch_size: 8
    #     inference_mode: batched

    # funasr 配置（SenseVoiceSmall / Paraformer）
    funasr:
      model: iic/SenseVoiceSmall
      hub: ms                    # ms=ModelScope, hf=HuggingFace
      trust_remote_code: true
      device: auto
      batch_size: 1
      timestamp_chunk_seconds: 5  # 每段秒数，用于细粒度时间戳
      max_workers: 4              # 并发处理 chunk 数
      language: null
      vad_model: null
      punc_model: null
      spk_model: null
      generate_kwargs: {}

  # ========== 远程模式 ==========
  remote:
    provider: mimo              # mimo（后续可扩展）
    base_url: https://token-plan-cn.xiaomimimo.com/v1
    api_key: null
    api_key_env: MIMO_API_KEY
    model: mimo-v2.5-asr
    timestamp_chunk_seconds: 5
    language: null

# ─── LLM 配置 ─────────────────────────────────
# active_provider 指定使用哪个 provider，切换时只需改这个值
llm:
  active_provider: openai
  providers:
    openai:
      api_key: null
      api_key_env: LLM_API_KEY
      base_url: null
      model: gpt-4o
      temperature: 0.1
      max_tokens: 8192
      timeout: 300
    mimo:
      api_key_env: MIMO_API_KEY
      base_url: https://token-plan-cn.xiaomimimo.com/v1
      model: mimo-v2.5-pro
      temperature: 0.1
      max_tokens: 8192
      timeout: 300
    opencode:
      api_key_env: OPENCODE_API_KEY
      base_url: https://opencode.ai/zen/go/v1
      model: deepseek-v4-flash
      temperature: 0.1
      max_tokens: 8192
      timeout: 300
  # 以下参数对所有 provider 生效
  retry_empty_with_reasoning: true
  reasoning_followup_rounds: 5
  reasoning_followup_max_tokens: 32768
  max_completion_tokens: 32768
  batch_size: null
  max_tool_rounds: 2
  final_tool_max_tokens: 32768
  continuation_on_length: true
  max_continuation_rounds: 8
  debug_store_requests: false
  reuse_valid_batches: true
  use_tools: true
  verify_with_search: true
  json_fix_rounds: 3

default_profile: accuracy

profiles:
  accuracy:
    llm:
      cache_friendly_prompt_layout: false
      compact_segment_ranges: false
    song:
      pipeline:
        strategy: legacy
        runtime_adaptive: disabled
        temporal_adjudication:
          enabled: false
      review:
        enabled: true
        transcript_scope: local
      missed_recheck:
        enabled: true
        strategy: windowed
        output_mode: matches
  kv_optimized:
    llm:
      cache_friendly_prompt_layout: true
      compact_segment_ranges: true
    song:
      normalization:
        force_merge_same_title: true
        chorus_aware_split: true
        chorus_gap_seconds: 120.0
        chorus_similarity_threshold: 0.3
        chorus_context_segments: 3
      pipeline:
        strategy: risk_routed_v3
        runtime_adaptive: fixed_three_stage
        temporal_adjudication:
          enabled: true
          preserve_source_names: true
          max_completion_tokens: 8192
        stages:
          discovery: precision
          recall_audit: uncovered_evidence
          adjudication: full_transcript
        continuation_overlap_segments: 50
        allow_final_discovery: true
        anchor_boundary_expansion: false
      naming:
        search_query_source: lyric_anchors
        preserve_unknown_on_weak_evidence: true
      search:
        enabled: false
        search_unknown_only: true
        max_searches: 25
      missed_recheck:
        enabled: true
        output_mode: anchors
        min_uncovered_seconds: 10.0
        check_all_uncovered: true
        max_tool_rounds: 0
      review:
        enabled: false

# ─── 时间 padding ─────────────────────────────
# before_seconds: 歌曲开始前 padding（基于前一个 ASR start + guard）
# after_seconds: 歌曲结束后 padding（不超过下一个 ASR end - guard）
padding:
  before_seconds: 15.0
  after_seconds: 15.0
  after_next_asr_end_guard_seconds: 2.0
  adaptive_silence_padding: true
  adaptive_silence_gap_threshold_seconds: 25.0
  adaptive_silence_gap_ratio: 0.95
  adaptive_max_before_seconds: 45.0
  adaptive_max_after_seconds: 45.0
  min_song_seconds: 75.0
  max_song_seconds: 360.0
  merge_gap_seconds: 40.0

# ─── 要识别的内容类型（true/false 控制启用/禁用）──
content_types:
  song: true
  dialogue: true
  highlight: true
  funny: true
  cringe: true
  daily_summary: false

# ─── 歌曲识别配置 ─────────────────────────────
song:
  enabled: true
  normalization:
    force_merge_same_title: false
    chorus_aware_split: false
    chorus_gap_seconds: 120.0
    chorus_similarity_threshold: 0.3
    chorus_context_segments: 3
  search:
    enabled: false
    search_unknown_only: true
    max_searches: 25
  risk:
    duration_weight: 1.0
    boundary_expansion_weight: 2.0
    overlap_weight: 2.0
    evidence_weight: 2.0
    review_threshold: 0.55
    reject_threshold: 0.90
    soft_min_seconds: 150
    soft_max_seconds: 360
    boundary_gap_seconds: 20
    low_confidence: 0.65
  padding:
    before_seconds: 15.0
    after_seconds: 15.0
    after_next_asr_end_guard_seconds: 2.0
    adaptive_silence_padding: true
    adaptive_silence_gap_threshold_seconds: 25.0
    adaptive_silence_gap_ratio: 0.95
    adaptive_max_before_seconds: 45.0
    adaptive_max_after_seconds: 45.0
    min_song_seconds: 75.0
    merge_gap_seconds: 40.0
  missed_recheck:
    fallback_strategy: windowed_on_structural_failure
    batch_size: 500
    min_gap_segments: 1
    context_segments: 10
    max_completion_tokens: 32768
    max_tool_rounds: 1
    max_anchor_segments: 12
    anchor_max_expansion_seconds: 420
  review:
    transcript_scope: local
    context_segments: 10
    max_window_segments: 500
    nearby_title_conflict_gap_segments: 2
    max_completion_tokens: 32768
    max_tool_rounds: 1
    fallback: local_best

# ─── 对话识别配置 ─────────────────────────────
dialogue:
  enabled: true
  min_duration: 10.0
  max_duration: 300.0
  min_confidence: 0.6
  merge_gap_seconds: 10.0
  tags:
    - 搞笑
    - 吐槽
    - 名场面
    - 金句
    - 互动
    - 高能

# ─── 高能时刻配置 ─────────────────────────────
highlight:
  enabled: true
  min_duration: 5.0
  max_duration: 120.0
  min_confidence: 0.6
  merge_gap_seconds: 15.0

# ─── 搞笑片段配置 ─────────────────────────────
funny:
  enabled: true
  min_duration: 5.0
  max_duration: 180.0
  min_confidence: 0.6
  merge_gap_seconds: 15.0

# ─── 下头对话配置 ─────────────────────────────
cringe:
  enabled: true
  min_duration: 5.0
  max_duration: 120.0
  min_confidence: 0.6
  merge_gap_seconds: 15.0

# ─── 当天直播结构化总结配置 ─────────────────
daily_summary:
  enabled: false
  summary_only: true
  language: zh-CN
  title: 当天直播内容总结
  max_level1_items: 6
  max_level2_per_level1: 5
  max_level3_per_level2: 4
  include_timeline: true
  include_quotes: true
  include_open_questions: true

# ─── 输出 ─────────────────────────────────────
output:
  video_clips: true
  audio_segments: true
  audio_extension: mp3           # 默认 mp3，兼容性最好
  audio_bitrate_kbps: 320
  video_extension: mp4
  video_codec: copy              # copy=不重编码; auto=nv > intel > amd > cpu
  match_context_segments: 10
  max_export_workers: 4          # FFmpeg 并行切片数
  concat_videos: false           # 合并目录下的多个视频后再处理
  clip_naming:
    enabled: false
    dictionary_path: streamer_dictionary.json
    default_streamer: StreamerName
    min_score: 0.65
    apply_to:
      - song
    # 日期 YYMMDD 仅从输入视频/目录路径解析（如 2026_06_03 -> 260603），不走词典
