name: tests

# Offline unit tests only — no config.yaml, API keys, or local media required.
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      DD_CLIP_MINER_LLM_CI: "1"
      LLM_API_KEY: ""
      MIMO_API_KEY: ""
      DEEPSEEK_API_KEY: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg mkvtoolnix libsndfile1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Compile package
        run: python -m compileall -q dd_clip_miner_llm tests

      - name: Run unit tests
        run: python -m pytest tests -q --basetemp=.tmp/pytest