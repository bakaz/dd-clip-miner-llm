# dd-clip-miner-llm DeepSeek 配置模板
# 复制为 config.yaml 后设置 DEEPSEEK_API_KEY 环境变量。

# ─── 音频预处理 ───────────────────────────────
audio:
  sample_rate: 16000
  channels: 1

# ─── ASR 配置 ─────────────────────────────────
asr:
  mode: local

  local:
    backend: funasr

    faster_whisper:
      model: small
      device: auto
      compute_type: default
      language: null
      beam_size: 5
      vad_filter: true
      initial_prompt: null

    funasr:
      model: iic/SenseVoiceSmall
      hub: ms
      trust_remote_code: true
      device: auto
      batch_size: 1
      timestamp_chunk_seconds: 5
      max_workers: 4
      language: null
      vad_model: null
      punc_model: null
      spk_model: null
      generate_kwargs: {}

  remote:
    provider: mimo
    base_url: https://token-plan-cn.xiaomimimo.com/v1
    api_key: null
    api_key_env: MIMO_API_KEY
    model: mimo-v2.5-asr
    timestamp_chunk_seconds: 5
    language: null

# ─── LLM 配置 ─────────────────────────────────
llm:
  api_key: null
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  thinking: disabled
  temperature: 0.1
  max_tokens: 8192
  max_completion_tokens: null
  retry_empty_with_reasoning: true
  reasoning_followup_rounds: 5
  reasoning_followup_max_tokens: 32768
  batch_size: null
  cache_friendly_prompt_layout: false
  compact_segment_ranges: false
  max_tool_rounds: 2
  final_tool_max_tokens: null
  use_tools: true
  verify_with_search: true
  json_fix_rounds: 3
  fallbacks: []

default_profile: accuracy

profiles:
  accuracy:
    llm:
      cache_friendly_prompt_layout: false
      compact_segment_ranges: false
      max_tokens: 8192
      max_completion_tokens: null
      final_tool_max_tokens: 16384
    song:
      review:
        enabled: true
  kv_optimized:
    llm:
      cache_friendly_prompt_layout: true
      compact_segment_ranges: true
      max_completion_tokens: 32768
      final_tool_max_tokens: 32768
    song:
      missed_recheck:
        strategy: adaptive
        fallback_strategy: windowed_on_structural_failure
        max_completion_tokens: 4096
        max_tool_rounds: 1
        adaptive:
          mode: cost_estimate
          cost_margin_ratio: 0.05
          fallback_penalty: 1.0
          full_transcript_max_segments: 3500
          windowed_min_target_ranges: 19
          pricing:
            input_cache_hit_per_1m: 0.0028
            input_cache_miss_per_1m: 0.14
            output_per_1m: 0.28
          token_chars_ratio: 0.62
          estimated_completion_tokens:
            main: 720
            review: 420
            overlong: 360
            missed_full: 1100
            missed_window: 360
      review:
        enabled: true
        transcript_scope: adaptive
        context_segments: 10
        max_window_segments: 500
        max_completion_tokens: 4096
        max_tool_rounds: 1
        fallback: local_best
        adaptive:
          mode: cost_estimate
          cost_margin_ratio: 0.05
          local_max_clusters: 3
          full_min_clusters: 6
          full_min_segments: 2000
          pricing:
            input_cache_hit_per_1m: 0.0028
            input_cache_miss_per_1m: 0.14
            output_per_1m: 0.28
          token_chars_ratio: 0.62
          estimated_completion_tokens:
            main: 720
            review: 420
            overlong: 360
            missed_full: 1100
            missed_window: 360

# ─── 时间 padding ─────────────────────────────
padding:
  before_seconds: 15.0
  after_seconds: 15.0
  after_next_asr_end_guard_seconds: 2.0
  adaptive_silence_padding: true
  adaptive_silence_gap_threshold_seconds: 25.0
  adaptive_silence_gap_ratio: 0.95
  adaptive_max_before_seconds: 45.0
  adaptive_max_after_seconds: 45.0
  min_song_seconds: 30.0
  merge_gap_seconds: 35.0

# ─── 要识别的内容类型（true/false 控制启用/禁用）──
content_types:
  song: true
  dialogue: true
  highlight: true
  funny: true
  cringe: true
  daily_summary: false

# ─── 歌曲识别配置 ─────────────────────────────
song:
  enabled: true
  padding:
    before_seconds: 15.0
    after_seconds: 15.0
    after_next_asr_end_guard_seconds: 2.0
    adaptive_silence_padding: true
    adaptive_silence_gap_threshold_seconds: 25.0
    adaptive_silence_gap_ratio: 0.95
    adaptive_max_before_seconds: 45.0
    adaptive_max_after_seconds: 45.0
    min_song_seconds: 30.0
    merge_gap_seconds: 35.0
  missed_recheck:
    enabled: true
    strategy: windowed
    fallback_strategy: windowed_on_structural_failure
    batch_size: 500
    min_gap_segments: 1
    context_segments: 10
    max_completion_tokens: 4096
    max_tool_rounds: 1
  review:
    enabled: false
    context_segments: 10
    max_window_segments: 500
    nearby_title_conflict_gap_segments: 2
    max_completion_tokens: 4096
    max_tool_rounds: 1
    fallback: local_best

# ─── 对话识别配置 ─────────────────────────────
dialogue:
  enabled: true
  min_duration: 10.0
  max_duration: 300.0
  min_confidence: 0.6
  merge_gap_seconds: 10.0
  tags:
    - 搞笑
    - 吐槽
    - 名场面
    - 金句
    - 互动
    - 高能

# ─── 高能时刻配置 ─────────────────────────────
highlight:
  enabled: true
  min_duration: 5.0
  max_duration: 120.0
  min_confidence: 0.6
  merge_gap_seconds: 15.0

# ─── 搞笑片段配置 ─────────────────────────────
funny:
  enabled: true
  min_duration: 5.0
  max_duration: 180.0
  min_confidence: 0.6
  merge_gap_seconds: 15.0

# ─── 下头对话配置 ─────────────────────────────
cringe:
  enabled: true
  min_duration: 5.0
  max_duration: 120.0
  min_confidence: 0.6
  merge_gap_seconds: 15.0

# ─── 当天直播结构化总结配置 ─────────────────
daily_summary:
  enabled: false
  summary_only: true
  language: zh-CN
  title: 当天直播内容总结
  max_level1_items: 6
  max_level2_per_level1: 5
  max_level3_per_level2: 4
  include_timeline: true
  include_quotes: true
  include_open_questions: true

# ─── 输出 ─────────────────────────────────────
output:
  video_clips: true
  audio_segments: true
  audio_extension: mp3
  audio_bitrate_kbps: 320
  video_extension: mp4
  video_codec: copy
  match_context_segments: 10
  concat_videos: false
