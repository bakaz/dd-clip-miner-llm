# dd-clip-miner-llm daily summary config
# Usage:
#   python -m dd_clip_miner_llm run live.mp4 --config config.daily-summary.example.yaml

audio:
  sample_rate: 16000
  channels: 1

asr:
  model: small
  device: auto
  compute_type: default
  language: null
  beam_size: 5
  vad_filter: true
  initial_prompt: null

llm:
  api_key: null
  api_key_env: LLM_API_KEY
  base_url: null
  model: gpt-4o
  temperature: 0.1
  max_tokens: 8192
  max_completion_tokens: null
  retry_empty_with_reasoning: true
  reasoning_followup_rounds: 5
  reasoning_followup_max_tokens: 32768
  batch_size: null
  use_tools: false
  verify_with_search: false
  json_fix_rounds: 3
  fallbacks: []

content_types:
  daily_summary: true

daily_summary:
  enabled: true
  summary_only: true
  language: zh-CN
  title: 当天直播内容总结
  max_level1_items: 6
  max_level2_per_level1: 5
  max_level3_per_level2: 4
  include_timeline: true
  include_quotes: true
  include_open_questions: true

output:
  video_clips: false
  audio_segments: false
  audio_extension: mp3
  audio_bitrate_kbps: 320
  video_extension: mp4
  video_codec: copy
  match_context_segments: 10
  concat_videos: false
